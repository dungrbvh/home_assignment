server {
    listen 80;
    default_type text/plain;

    location = / {
        return 200 "Welcome to the platform\n";
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

}
